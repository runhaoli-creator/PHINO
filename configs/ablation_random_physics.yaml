# DynaCLIP Ablation: Random Physics Assignment (old data)
# Tests whether category-grounded physics priors matter vs random assignment

model:
  backbone: "dinov2_vitb14"
  embed_dim: 512
  freeze_backbone: false
  unfreeze_last_n_blocks: -1
  gradient_checkpointing: true

loss:
  name: "soft_infonce"
  temperature: 0.07
  similarity_temperature: 0.1
  learnable_temperature: true

training:
  backbone_lr: 1.0e-5
  head_lr: 1.0e-3
  weight_decay: 0.05
  warmup_steps: 100
  total_steps: 5000
  batch_size: 128
  grad_accum_steps: 4
  use_bf16: true

data:
  data_dir: "data_cache/dynaclip_data_v1_random"  # OLD data with random physics
  num_pairs: 500000
  hard_neg_ratio: 0.3
  hard_pos_ratio: 0.3
  num_workers: 4

logging:
  log_every: 50
  eval_every: 2500
  save_every: 2500
  use_wandb: false
  project_name: "dynaclip-ablation-random-physics"

output:
  checkpoint_dir: "checkpoints/ablation_random_physics"
  log_dir: "logs/ablation_random_physics"
