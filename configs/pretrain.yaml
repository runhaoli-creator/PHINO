# DynaCLIP Pre-training Configuration (v2: category-grounded physics)

# Model
model:
  backbone: "dinov2_vitb14"
  embed_dim: 512
  freeze_backbone: false
  unfreeze_last_n_blocks: -1  # -1 = all unfrozen
  gradient_checkpointing: true

# Loss
loss:
  name: "soft_infonce"
  temperature: 0.07
  similarity_temperature: 0.1
  learnable_temperature: true

# Training (5 GPU DDP: effective batch = 640 * 2 = 1280)
training:
  backbone_lr: 1.0e-5
  head_lr: 1.0e-3
  weight_decay: 0.05
  warmup_steps: 500
  total_steps: 30000
  batch_size: 640           # Total across all GPUs (640/5 = 128 per GPU)
  grad_accum_steps: 2       # Effective batch = 640 * 2 = 1280
  use_bf16: true

# Data
data:
  data_dir: "data_cache/dynaclip_data"
  num_pairs: 500000
  hard_neg_ratio: 0.3
  hard_pos_ratio: 0.3
  num_workers: 4

# Logging
logging:
  log_every: 50
  eval_every: 2500
  save_every: 2500
  use_wandb: false
  project_name: "dynaclip"

# Output
output:
  checkpoint_dir: "checkpoints/pretrain"
  log_dir: "logs/pretrain"
